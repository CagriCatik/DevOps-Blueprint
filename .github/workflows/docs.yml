# Build the Zensical site and deploy it to GitHub Pages.
# Source: https://zensical.org/docs/publish-your-site/
#
# One-time setup in your GitHub repo:
#   Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"
name: Documentation

on:
  push:
    branches:
      - main
      - master

# Permissions required for GitHub Pages deployment via OIDC
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install zensical
      - run: zensical build --clean
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment
