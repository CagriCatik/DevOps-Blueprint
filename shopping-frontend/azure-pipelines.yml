# azure-pipelines.yml — CI for the shopping-frontend Flask app.
# Picks a Python version, installs dependencies, lints, and runs the tests
# on every push to main. See docs module 3 (Azure YAML Pipelines).
trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: '3.12'

steps:
  - task: UsePythonVersion@0
    displayName: Use Python $(pythonVersion)
    inputs:
      versionSpec: $(pythonVersion)

  - script: |
      python -m pip install --upgrade pip
      pip install -r requirements-dev.txt
    displayName: Install dependencies

  - script: flake8 .
    displayName: Lint

  - script: pytest --junitxml=junit/test-results.xml --cov=app --cov-report=xml
    displayName: Run tests

  - task: PublishTestResults@2
    displayName: Publish test results
    condition: succeededOrFailed()
    inputs:
      testResultsFiles: junit/test-results.xml
      testRunTitle: shopping-frontend

  - task: PublishCodeCoverageResults@2
    displayName: Publish code coverage
    condition: succeededOrFailed()
    inputs:
      summaryFileLocation: coverage.xml
